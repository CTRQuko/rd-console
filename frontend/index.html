<style>
  /* Boot splash hides until React mounts */
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--fg); }
  #root { min-height: 100vh; }
  .boot {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); color: var(--fg-muted); font-family: var(--font-sans);
    font-size: 14px;
  }
</style>
</head>
<body>
<div id="root"><div class="boot">Cargando consola…</div></div>

<!--
  Etapa 4, PR 1 (ESM migration): Vite bundles src/main.tsx with real
  React 18 + JSX transform + HMR. The previous CDN trio (React UMD,
  ReactDOM UMD, @babel/standalone) is gone, and so are all the
  <script type="text/babel"> tags that loaded the legacy .jsx files
  from public/console/. Migration goes page by page across PR 1-5;
  unmigrated routes show a placeholder until they land.
-->
<script type="module" src="/src/main.tsx"></script>
</body>
