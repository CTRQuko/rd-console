<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>rd-console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Design tokens (now with @font-face for Inter / InterDisplay) -->
<link rel="stylesheet" href="/design/tokens.css" />
<link rel="stylesheet" href="/design/components.css" />
<link rel="stylesheet" href="/design/layout.css" />

<!-- Mockup-only styles -->
<link rel="stylesheet" href="/console/shell.css" />
<link rel="stylesheet" href="/console/pages.css?v=6" />

<style>
  /* Boot splash hides until React mounts */
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--fg); }
  #root { min-height: 100vh; }
  .boot {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); color: var(--fg-muted); font-family: var(--font-sans);
    font-size: 14px;
  }
</style>
</head>
<body>
<div id="root"><div class="boot">Cargando consola…</div></div>

<!-- React 18 + Babel (pinned, mirrors Console Mockup.html from the ZIP) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks framework (theme/density/accent persistence) -->

<!-- Shared primitives & icons -->

<!-- Shell: sidebar, topbar, router, theme -->

<!-- Pages -->
<script type="text/babel" src="/console/pages/Dashboard.edit.jsx"></script>
<script type="text/babel" src="/console/pages/Dashboard.jsx"></script>
<script type="text/babel" src="/console/pages/Devices.jsx"></script>
